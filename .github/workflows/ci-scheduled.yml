name: Scheduled CI and README Updates

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-name: dnadis
          create-args: >-
            python=${{ matrix.python-version }}
            intervaltree
            miniprot gffread blast mm2plus centrifuger pytest
            -c conda-forge -c bioconda
      - name: Run tests
        run: micromamba run -n dnadis pytest -q
      - name: Record passing python
        if: success()
        run: |
          mkdir -p passed
          echo "${{ matrix.python-version }}" > "passed/python-${{ matrix.python-version }}.txt"
      - name: Upload passing python marker
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: passed-${{ matrix.python-version }}
          path: passed/python-${{ matrix.python-version }}.txt

  update-readme:
    needs: tests
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - name: Download pass markers
        uses: actions/download-artifact@v4
        with:
          pattern: passed-*
          merge-multiple: true
          path: passed
      - name: Determine latest passing Python
        id: latest
        run: |
          if ls passed/python-*.txt 1> /dev/null 2>&1; then
            latest=$(ls passed/python-*.txt | sed -E 's/.*python-([0-9]+\.[0-9]+)\.txt/\1/' | sort -V | tail -n 1)
            echo "python=${latest}" >> "$GITHUB_OUTPUT"
          else
            echo "No passing Python versions found; skipping README update."
            echo "python=" >> "$GITHUB_OUTPUT"
          fi
      - name: Setup micromamba
        if: steps.latest.outputs.python != ''
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-name: dnadis
          create-args: >-
            python=${{ steps.latest.outputs.python }}
            intervaltree
            miniprot gffread blast mm2plus centrifuger pytest
            -c conda-forge -c bioconda
      - name: Capture conda versions
        if: steps.latest.outputs.python != ''
        run: |
          micromamba run -n dnadis conda list > conda-list.txt
      - name: Update README with Python and package versions
        if: steps.latest.outputs.python != ''
        run: |
          python scripts/update_readme_python.py --python "${{ steps.latest.outputs.python }}"
          python scripts/update_readme_conda_versions.py \
            --packages python miniprot gffread blast mm2plus centrifuger \
            --conda-list conda-list.txt
      - name: Create PR for README updates
        if: steps.latest.outputs.python != ''
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Update README conda python and package versions"
          title: "Update README conda python and package versions"
          branch: "ci/update-readme-conda-versions"
          delete-branch: true
