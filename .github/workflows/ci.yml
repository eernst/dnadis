name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  resolve-python:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-name: resolver
          create-args: >-
            python=3.10
            -c conda-forge
      - name: Resolve latest Python from conda-forge
        id: matrix
        run: |
          latest=$(micromamba repoquery search python -c conda-forge --json \
            | python -c 'code="import json\nimport re\nimport sys\n"\
            "data=json.load(sys.stdin)\n"\
            "if isinstance(data,list):\n    records=data\n"\
            "elif isinstance(data,dict):\n    records=data.get(\'records\') or data.get(\'packages\') or data.get(\'result\') or []\n"\
            "else:\n    records=[]\n"\
            "versions=set()\n"\
            "for rec in records:\n    ver=None\n"\
            "    if isinstance(rec,dict):\n        ver=rec.get(\'version\') or rec.get(\'package_version\') or rec.get(\'ver\')\n"\
            "    elif isinstance(rec,str):\n        m=re.search(r\'(\\\\d+\\\\.\\\\d+\\\\.\\\\d+)\', rec)\n        ver=m.group(1) if m else None\n"\
            "    if ver:\n        m=re.match(r\'^(\\\\d+)\\\\.(\\\\d+)\\\\.\\\\d+$\', ver)\n        if m:\n            versions.add(f\'{m.group(1)}.{m.group(2)}\')\n"\
            "print(sorted(versions, key=lambda s: tuple(map(int, s.split(\'.\'))))[-1] if versions else \'\')"; exec(code)')
          if [ -z "$latest" ]; then
            echo "Failed to resolve latest Python from conda-forge." >&2
            exit 1
          fi
          python -c 'import json; oldest="3.8"; latest="'"${latest}"'"; \
            versions=[]; [versions.append(v) for v in (oldest, latest) if v not in versions]; \
            print(f"matrix={json.dumps({\"python-version\": versions})}")' >> "$GITHUB_OUTPUT"

  tests:
    needs: resolve-python
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.resolve-python.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup micromamba
        uses: mamba-org/setup-micromamba@v1
        with:
          micromamba-version: "latest"
          environment-name: final_finalizer
          create-args: >-
            python=${{ matrix.python-version }}
            miniprot gffread blast minimap2 centrifuger pytest
            -c conda-forge -c bioconda
      - name: Run tests
        run: micromamba run -n final_finalizer pytest -q
